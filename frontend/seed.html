<!DOCTYPE html>
<html>
<head><title>Seed Firebase</title></head>
<body>
<h2>Firebase Seeder for Smart Parking</h2>
<p id="status">Loading...</p>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBW6EKfOp58xMVL-5_gkB_rU0gTqH8soN0",
  authDomain: "fast-parking-system-e3808.firebaseapp.com",
  databaseURL: "https://fast-parking-system-e3808-default-rtdb.firebaseio.com",
  projectId: "fast-parking-system-e3808",
  storageBucket: "fast-parking-system-e3808.firebasestorage.app",
  messagingSenderId: "294207528846",
  appId: "1:294207528846:web:a2a482e51884f53e67cedf"
});

const db = getDatabase(app);

const data = {
  basementA: { id: "basementA", name: "Basement A", totalSpots: 100, occupiedSpots: 40, icon: "🅰️" },
  basementB: { id: "basementB", name: "Basement B", totalSpots: 80, occupiedSpots: 20, icon: "🅱️" },
  groundParking: { id: "groundParking", name: "Ground Parking", totalSpots: 150, occupiedSpots: 90, icon: "🚗" },
  bikeParking: { id: "bikeParking", name: "Bike Parking", totalSpots: 200, occupiedSpots: 50, icon: "🏍️" }
};

try {
  await set(ref(db, "parkingZones"), data);
  document.getElementById("status").innerHTML = "✅ <b>SUCCESS!</b> Database seeded with parking data. You can close this page and refresh your app.";
  document.getElementById("status").style.color = "green";
} catch(e) {
  document.getElementById("status").innerHTML = "❌ <b>FAILED:</b> " + e.message + "<br><br>Make sure Firebase rules are set to: { rules: { .read: true, .write: true } }";
  document.getElementById("status").style.color = "red";
}
</script>
</body>
</html>
